<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="bgDark" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <style>
      @media (prefers-color-scheme: light) {
        .bg-rect { fill: url(#bg); }
      }
      @media (prefers-color-scheme: dark) {
        .bg-rect { fill: url(#bgDark); }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg-rect" width="180" height="180" rx="36" fill="url(#bg)"/>

  <!-- Book body left page -->
  <path d="M90 54 C90 54 62 58 52 70 L52 130 C62 118 90 114 90 114 Z" fill="white" opacity="0.95"/>
  <!-- Book body right page -->
  <path d="M90 54 C90 54 118 58 128 70 L128 130 C118 118 90 114 90 114 Z" fill="white" opacity="0.80"/>
  <!-- Book spine -->
  <rect x="88" y="54" width="4" height="60" rx="2" fill="white" opacity="1"/>

  <!-- Star accent top center -->
  <polygon points="90,32 93.1,41.5 103,41.5 95.5,47.4 98.5,57 90,51.3 81.5,57 84.5,47.4 77,41.5 86.9,41.5" fill="#fbbf24"/>

  <!-- Lines on left page (text lines) -->
  <line x1="65" y1="80" x2="83" y2="77" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="65" y1="90" x2="83" y2="87" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="65" y1="100" x2="83" y2="97" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
</svg>